<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語テスト</title>

<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
button { display:block; margin:10px auto; padding:12px; width:85%; font-size:16px; }
input { padding:10px; width:80%; font-size:16px; }
</style>
</head>

<body>

<h2>英単語テスト</h2>

<div id="start">
  <input id="name" placeholder="名前を入力"><br><br>
  <button onclick="startTest()">スタート</button>
</div>

<div id="quiz" style="display:none;">
  <h3 id="status"></h3>
  <h2 id="word"></h2>
  <div id="choices"></div>
  <p id="result"></p>
</div>

<script src="words.js"></script>

<script>
let current = 0;
let total = 50;
let score = 0;
let correctIndex = 0;
let name = "";

// 重複防止フラグ
let finished = false;
let sent = false;

// ----------------

function startTest(){
  name = document.getElementById("name").value;
  if(!name){
    alert("名前を入力してください");
    return;
  }

  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  nextQuestion();
}

// ----------------

function nextQuestion(){
  if(finished) return;

  current++;

  if(current > total){
    finish();
    return;
  }

  document.getElementById("status").textContent = current + " / " + total;

  const q = words[Math.floor(Math.random() * words.length)];

  const correct = q.meaning;
  let choices = [correct];

  while(choices.length < 4){
    let w = words[Math.floor(Math.random()*words.length)].meaning;
    if(!choices.includes(w)) choices.push(w);
  }

  choices.sort(()=>Math.random()-0.5);
  correctIndex = choices.indexOf(correct);

  document.getElementById("word").textContent = q.word;

  const div = document.getElementById("choices");
  div.innerHTML = "";

  choices.forEach((c,i)=>{
    const btn = document.createElement("button");
    btn.textContent = c;
    btn.onclick = ()=>answer(i);
    div.appendChild(btn);
  });

  document.getElementById("result").textContent="";
}

// ----------------

function answer(i){
  if(finished) return;

  if(i === correctIndex){
    score++;
    document.getElementById("result").textContent="正解！";
  }else{
    document.getElementById("result").textContent="不正解";
  }

  setTimeout(nextQuestion, 600);
}

// ----------------

function finish(){
  if(finished) return;
  finished = true;

  document.body.innerHTML = `
    <h1>テスト終了</h1>
    <h2>${score} / ${total}</h2>
    <p>正答率：${Math.round(score/total*100)}%</p>
  `;

  sendResult();
}

// ----------------

function sendResult(){
  if(sent) return;
  sent = true;

  fetch("https://script.google.com/macros/s/AKfycbyc9tnA_pKsCjUMQwLn_EDEJBLqxCXNo3eTPWScnYyg8RUIoo4V409pmYHSNB3TUi3X/exec", {
    method: "POST",
    body: new URLSearchParams({
      name: name,
      score: score,
      total: total
    })
  });
}

</script>

</body>
</html>
